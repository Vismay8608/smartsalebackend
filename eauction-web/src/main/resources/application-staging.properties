# ==============================================================================
# STAGING — Production-mirror for pre-release validation
# Infra mirrors prod. Data is anonymised prod copy.
# ==============================================================================

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://staging-db.internal:5432/esale_staging}
spring.datasource.username=${DB_USER:eauction_staging}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=EAuctionPool-Staging
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=45000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=60000

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:staging-redis.internal}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=43200

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,loggers

# ── Swagger (read-only for internal validation) ───────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=false
springdoc.api-docs.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.eauction=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
