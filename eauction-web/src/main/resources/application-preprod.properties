# ==============================================================================
# PRE-PROD — Final release gate. Treat operationally like production.
# Swagger OFF. All secrets must be injected — no defaults for credentials.
# ==============================================================================

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=EAuctionPool-PreProd
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=60000

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=30
spring.data.redis.lettuce.pool.max-idle=15
spring.data.redis.lettuce.pool.min-idle=8

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=28800

# ── Actuator (health only for load-balancer probes) ──────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Swagger — disabled ────────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.eauction=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
