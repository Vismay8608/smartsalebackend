# ==============================================================================
# PRODUCTION — Live environment
# ALL secrets from secret manager / Kubernetes secrets.
# Startup fails fast if any required env var is missing (no fallback defaults).
# ==============================================================================

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=EAuctionPool-Prod
spring.datasource.hikari.maximum-pool-size=200
spring.datasource.hikari.minimum-idle=30
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=30000

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=10

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=28800

# ── Actuator (liveness/readiness only for k8s / ALB) ────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Swagger — disabled ────────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ── Logging — minimal noise in production ────────────────────────────────────
logging.level.root=WARN
logging.level.com.eauction=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql=ERROR
