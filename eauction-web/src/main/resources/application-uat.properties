# ==============================================================================
# UAT — User Acceptance Testing (client-facing, stable dataset)
# ==============================================================================

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://uat-db.internal:5432/esale_uat}
spring.datasource.username=${DB_USER:eauction_uat}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=EAuctionPool-UAT
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:uat-redis.internal}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=15
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=3

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=86400

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics

# ── Swagger (UAT testers need it) ─────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.eauction=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
