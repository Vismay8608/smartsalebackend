# ==============================================================================
# BASE CONFIGURATION — shared across all environments
# Profile-specific files override only what changes per environment.
# Activate:  SPRING_PROFILES_ACTIVE=local|qa|uat|staging|preprod|prod
# ==============================================================================

spring.application.name=eauction-platform

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── JWT (secret + expiry set per profile) ────────────────────────────────────
app.jwt.issuer=eauction-platform
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=604800

# ── Actuator (widened per non-prod profile) ───────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── OpenAPI / Swagger (disabled per preprod + prod profile) ───────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs

# ── Logging baseline ─────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.eauction=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
