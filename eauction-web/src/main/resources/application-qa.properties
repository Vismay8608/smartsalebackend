# ==============================================================================
# QA — Internal testing environment (dev team + QA engineers)
# Secrets injected via CI/CD env vars or secret manager — no hardcoded creds.
# ==============================================================================

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://qa-db.internal:5432/esale_qa}
spring.datasource.username=${DB_USER:eauction_qa}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=EAuctionPool-QA
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:qa-redis.internal}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=604800

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,loggers

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ── JPA (SQL visible in QA logs) ─────────────────────────────────────────────
spring.jpa.show-sql=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.eauction=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=WARN
